server:
  port: 8081

spring:
  application:
    name: user-service
  couchbase:
    connection-string: couchbase://localhost
    user-name: admin
    password: password
  data:
    couchbase:
      bucket-name: users
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/MotoNexus

management:
  endpoints:
    web:
      exposure:
        include: health,info
