<div class="community-container animate-fade-up">
  <div class="header">
    <h2 class="text-gradient-primary">MotoFeed</h2>
    <p class="text-gradient">Connect with riders worldwide.</p>
    
    <div class="new-post-container glass-panel">
      <textarea #postInput placeholder="What's happening, rider?"></textarea>
      
      <div class="upload-controls">
        <label class="file-upload-btn">
          <input type="file" (change)="onFileSelected($event)" accept="image/*,video/*" hidden>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
          Add Photo/Video
        </label>
        <span class="file-name" *ngIf="selectedFile">{{ selectedFile.name }}</span>
      </div>

      <button class="btn-primary" (click)="createPost(postInput.value, postInput)">
        Post to Feed
      </button>
    </div>
  </div>

  <div class="feed">
    <div class="glass-panel post-card" *ngFor="let post of posts">
      <div class="post-header">
        <div class="avatar">
          {{ (post.authorId || 'R').charAt(0) }}
        </div>
        <div class="meta">
          <h4>{{ post.authorId }}</h4>
          <span class="time">{{ post.createdAt | date:'short' }}</span>
        </div>
      </div>
      
      <p class="content">{{ post.content }}</p>
      
      <div class="post-image" *ngIf="post.imageUrl">
        <img [src]="post.imageUrl" alt="Post Image">
      </div>
      
      <div class="actions">
        <button class="action-btn" [class.active]="post.likes?.includes(authService.identityClaims?.['sub'])" (click)="toggleLike(post)">
          <svg viewBox="0 0 24 24" width="20" height="20" [attr.fill]="post.likes?.includes(authService.identityClaims?.['sub']) ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
          </svg>
          <span>{{ post.likes?.length || 0 }}</span>
        </button>
        <button class="action-btn">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
          <span>Comment</span>
        </button>
      </div>
    </div>
  </div>
</div>
